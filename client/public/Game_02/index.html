<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Breakout</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./logic.js" defer></script>
  </head>
  <body>
    <main class="game-shell">
      <div class="game-frame">
        <canvas id="myCanvas" width="480" height="320"></canvas>
      </div>

      <div class="game-actions">
        <button id="runButton" class="game-button">Start game</button>
        <button id="testScore" class="game-button game-button-secondary">Send test score</button>
        <button id="GetResults" class="game-button game-button-secondary">Load my results</button>
      </div>
    </main>
  </body>
</html>
